openapi: 3.1.0
info:
  title: AgentOps Hub MVP API
  version: v1
  description: Contract draft only. No runtime service is implemented by this file.
servers:
  - url: https://agentops.example.local
    description: Contract placeholder URL
tags:
  - name: auth
  - name: tickets
  - name: approvals
  - name: ai-tasks
  - name: knowledge
  - name: stream
paths:
  /api/auth/login:
    post:
      tags: [auth]
      operationId: login
      summary: Authenticate a user for a tenant.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/auth/me:
    get:
      tags: [auth]
      operationId: getCurrentUser
      summary: Return the current user and tenant context.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
      responses:
        '200':
          description: Current user context.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUserResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
  /api/tickets:
    get:
      tags: [tickets]
      operationId: listTickets
      summary: List tickets with paging.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/TicketStatus'
        - $ref: '#/components/parameters/TicketPriority'
        - $ref: '#/components/parameters/TicketCategory'
        - $ref: '#/components/parameters/CustomerId'
        - $ref: '#/components/parameters/CreatedFrom'
        - $ref: '#/components/parameters/CreatedTo'
        - $ref: '#/components/parameters/SlaDueBefore'
        - $ref: '#/components/parameters/TicketQuery'
      responses:
        '200':
          description: Ticket list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketListResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [tickets]
      operationId: createTicket
      summary: Create a ticket draft in the ticket domain.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTicketRequest'
      responses:
        '201':
          description: Ticket created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketDetail'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
  /api/tickets/{id}:
    get:
      tags: [tickets]
      operationId: getTicket
      summary: Return one ticket.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Ticket detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketDetail'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
  /api/approvals:
    post:
      tags: [approvals]
      operationId: createApproval
      summary: Create an approval instance for a high-risk business action request.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApprovalRequest'
      responses:
        '201':
          description: Approval instance created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalInstance'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
  /api/approvals/{id}:
    get:
      tags: [approvals]
      operationId: getApproval
      summary: Return approval instance detail for the current tenant.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Approval instance detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalInstance'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
  /api/approvals/{id}/approve:
    post:
      tags: [approvals]
      operationId: approveApproval
      summary: Approve a pending approval instance and create one action command.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalDecisionRequest'
      responses:
        '200':
          description: Approval instance approved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalInstance'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
  /api/approvals/{id}/reject:
    post:
      tags: [approvals]
      operationId: rejectApproval
      summary: Reject a pending approval instance without creating an action command.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalDecisionRequest'
      responses:
        '200':
          description: Approval instance rejected.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalInstance'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
  /api/approvals/{id}/cancel:
    post:
      tags: [approvals]
      operationId: cancelApproval
      summary: Cancel a pending approval instance.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalDecisionRequest'
      responses:
        '200':
          description: Approval instance cancelled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalInstance'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
  /api/action-commands/{id}:
    get:
      tags: [approvals]
      operationId: getActionCommand
      summary: Return an action command and its execution result for the current tenant.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Action command detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionCommand'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
  /api/ai/tasks:
    get:
      tags: [ai-tasks]
      operationId: listAiTasks
      summary: List AI tasks with paging.
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: AI task list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiTaskListResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [ai-tasks]
      operationId: createAiTask
      summary: Create an AI task request.
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAiTaskRequest'
      responses:
        '202':
          description: AI task accepted for asynchronous processing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiTask'
        '400':
          $ref: '#/components/responses/ErrorResponse'
  /api/ai/tasks/{id}:
    get:
      tags: [ai-tasks]
      operationId: getAiTask
      summary: Return AI task status.
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: AI task detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiTask'
        '404':
          $ref: '#/components/responses/ErrorResponse'
  /api/ai/tasks/{id}/steps:
    get:
      tags: [ai-tasks]
      operationId: listAiTaskSteps
      summary: Return Agent steps for a task.
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Agent steps.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentStepListResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
  /api/ai/tasks/{id}/report:
    get:
      tags: [ai-tasks]
      operationId: getAiTaskReport
      summary: Return the report for a completed task.
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Report summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportSummary'
        '404':
          $ref: '#/components/responses/ErrorResponse'
  /api/knowledge/documents:
    get:
      tags: [knowledge]
      operationId: listDocuments
      summary: List knowledge documents.
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Document list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentListResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [knowledge]
      operationId: registerDocument
      summary: Register a document upload for future parsing.
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterDocumentRequest'
      responses:
        '202':
          description: Document registered for parsing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentSummary'
        '400':
          $ref: '#/components/responses/ErrorResponse'
  /api/knowledge/search:
    post:
      tags: [knowledge]
      operationId: searchKnowledge
      summary: Search knowledge with storage-neutral citations.
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KnowledgeSearchRequest'
      responses:
        '200':
          description: Knowledge search results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeSearchResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
  /api/stream/tasks/{id}:
    get:
      tags: [stream]
      operationId: streamTaskStatus
      summary: SSE stream for task status.
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: SSE stream. Events carry task and Agent status payloads defined by shared contracts.
          content:
            text/event-stream:
              schema:
                type: string
        '404':
          $ref: '#/components/responses/ErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    TenantIdHeader:
      name: X-Tenant-Id
      in: header
      required: true
      schema:
        type: string
    TraceIdHeader:
      name: X-Trace-Id
      in: header
      required: true
      schema:
        type: string
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: page_size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    TicketStatus:
      name: status
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/TicketStatus'
    TicketPriority:
      name: priority
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/TicketPriority'
    TicketCategory:
      name: category
      in: query
      required: false
      schema:
        type: string
    CustomerId:
      name: customer_id
      in: query
      required: false
      schema:
        type: string
    CreatedFrom:
      name: created_from
      in: query
      required: false
      schema:
        type: string
        format: date-time
    CreatedTo:
      name: created_to
      in: query
      required: false
      schema:
        type: string
        format: date-time
    SlaDueBefore:
      name: sla_due_before
      in: query
      required: false
      schema:
        type: string
        format: date-time
    TicketQuery:
      name: query
      in: query
      required: false
      schema:
        type: string
  responses:
    ErrorResponse:
      description: Unified error response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      required: [error_code, message, trace_id, retryable]
      properties:
        error_code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
        trace_id:
          type: string
        retryable:
          type: boolean
    AuditFields:
      type: object
      required: [created_by, created_at]
      properties:
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
        updated_by:
          type: string
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
    PageMeta:
      type: object
      required: [page, page_size, total]
      properties:
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer
    LoginRequest:
      type: object
      required: [tenant_id, username, password]
      properties:
        tenant_id:
          type: string
        username:
          type: string
        password:
          type: string
          format: password
    LoginResponse:
      type: object
      required: [tenant_id, user_id, access_token, expires_at]
      properties:
        tenant_id:
          type: string
        user_id:
          type: string
        access_token:
          type: string
        expires_at:
          type: string
          format: date-time
    CurrentUserResponse:
      type: object
      required: [tenant_id, user_id, username, roles, permissions]
      properties:
        tenant_id:
          type: string
        user_id:
          type: string
        username:
          type: string
        roles:
          type: array
          items:
            type: string
        permissions:
          type: array
          items:
            type: string
    TicketStatus:
      type: string
      enum: [open, in_progress, waiting_customer, resolved, closed]
    TicketPriority:
      type: string
      enum: [low, normal, high, urgent]
    CustomerSummary:
      type: object
      required: [customer_id, display_name]
      properties:
        customer_id:
          type: string
        display_name:
          type: string
        external_ref:
          type: string
          nullable: true
    CreateCustomerInput:
      type: object
      required: [display_name]
      properties:
        display_name:
          type: string
        external_ref:
          type: string
          nullable: true
    TicketSummary:
      type: object
      required: [ticket_id, tenant_id, title, status, priority, category, customer, audit]
      properties:
        ticket_id:
          type: string
        tenant_id:
          type: string
        title:
          type: string
        status:
          $ref: '#/components/schemas/TicketStatus'
        priority:
          $ref: '#/components/schemas/TicketPriority'
        category:
          type: string
        customer:
          $ref: '#/components/schemas/CustomerSummary'
        sla_due_at:
          type: string
          format: date-time
          nullable: true
        audit:
          $ref: '#/components/schemas/AuditFields'
    TicketDetail:
      allOf:
        - $ref: '#/components/schemas/TicketSummary'
        - type: object
          required: [description]
          properties:
            description:
              type: string
    CreateTicketRequest:
      type: object
      required: [title, description, priority, category]
      oneOf:
        - required: [customer_id]
        - required: [customer]
      properties:
        title:
          type: string
        description:
          type: string
        priority:
          $ref: '#/components/schemas/TicketPriority'
        category:
          type: string
        customer_id:
          type: string
        customer:
          $ref: '#/components/schemas/CreateCustomerInput'
        sla_due_at:
          type: string
          format: date-time
          nullable: true
    TicketListResponse:
      type: object
      required: [items, page]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TicketSummary'
        page:
          $ref: '#/components/schemas/PageMeta'
    ApprovalStatus:
      type: string
      enum: [pending, approved, rejected, cancelled, expired]
    ActionCommandStatus:
      type: string
      enum: [pending, success, failed, cancelled]
    ApprovalCitationSummary:
      type: object
      required: [document_id, chunk_id, source_title]
      properties:
        document_id:
          type: string
        chunk_id:
          type: string
        source_title:
          type: string
        source_uri:
          type: string
          nullable: true
    TicketFollowupActionInput:
      type: object
      required: [ticket_id, title, reason, approval_policy]
      properties:
        ticket_id:
          type: string
        title:
          type: string
        reason:
          type: string
        due_at:
          type: string
          format: date-time
          nullable: true
        approval_policy:
          type: string
          enum: [required, policy_check_required]
    TicketFollowupActionOutput:
      type: object
      required: [followup_task_ref, ticket_id, created_at, created_by]
      properties:
        followup_task_ref:
          type: string
        ticket_id:
          type: string
        created_at:
          type: string
          format: date-time
        created_by:
          type: string
    CreateApprovalRequest:
      type: object
      required:
        [source_type, source_task_id, target_type, target_id, action_type, requested_by, risk_reason, idempotency_key, action_input]
      properties:
        source_type:
          type: string
        source_task_id:
          type: string
        target_type:
          type: string
        target_id:
          type: string
        action_type:
          type: string
          enum: [ticket_create_followup]
        requested_by:
          type: string
        risk_reason:
          type: string
        idempotency_key:
          type: string
        citations:
          type: array
          items:
            $ref: '#/components/schemas/ApprovalCitationSummary'
        action_input:
          $ref: '#/components/schemas/TicketFollowupActionInput'
    ApprovalDecisionRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
    ApprovalRecord:
      type: object
      required:
        [approval_record_id, approval_instance_id, tenant_id, decision, decided_by, reason, action_summary, trace_id, created_at]
      properties:
        approval_record_id:
          type: string
        approval_instance_id:
          type: string
        tenant_id:
          type: string
        decision:
          type: string
          enum: [approved, rejected, cancelled, expired]
        decided_by:
          type: string
        reason:
          type: string
        action_summary:
          type: string
        trace_id:
          type: string
        created_at:
          type: string
          format: date-time
    ActionCommand:
      type: object
      required:
        [action_command_id, approval_instance_id, tenant_id, action_type, target_type, target_id, idempotency_key, status, created_by, created_at]
      properties:
        action_command_id:
          type: string
        approval_instance_id:
          type: string
        tenant_id:
          type: string
        action_type:
          type: string
          enum: [ticket_create_followup]
        target_type:
          type: string
        target_id:
          type: string
        idempotency_key:
          type: string
        status:
          $ref: '#/components/schemas/ActionCommandStatus'
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
        executed_at:
          type: string
          format: date-time
